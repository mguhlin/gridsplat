<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EasySheet</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: #172033;
        background: #f7fbff;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(760px, calc(100% - 32px));
        padding: 40px 0;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2.5rem, 7vw, 5rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        max-width: 58ch;
        margin: 0 0 20px;
        font-size: 1.2rem;
        line-height: 1.55;
      }

      a {
        color: #0757a8;
        font-weight: 700;
      }

      .status {
        display: inline-block;
        margin-bottom: 24px;
        padding: 8px 12px;
        border: 2px solid #2f6f4f;
        border-radius: 8px;
        color: #17442f;
        background: #e5f8ed;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="status">Planning in progress</span>
      <h1>EasySheet</h1>
      <p>
        A planned child-centered spreadsheet, charting, and graphing tool for grades 3-8.
      </p>
      <p>
        The modular build plan is available in the repository as
        <a href="plan.md">plan.md</a>.
      </p>
    </main>
  </body>
</html>
